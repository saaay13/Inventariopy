<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Inventario v1.0</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; font-size: 13px; background: #d4d0c8; }

    /* ── Barra de título estilo Windows 98 ── */
    .titlebar {
      background: linear-gradient(to right, #000080, #1084d0);
      color: white; padding: 4px 8px;
      font-weight: bold; font-size: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .titlebar span.icon { font-size: 18px; }

    /* ── Menú ── */
    nav {
      background: #d4d0c8;
      border-bottom: 2px solid #808080;
      padding: 4px 8px;
      display: flex; gap: 4px;
    }
    nav a {
      background: #d4d0c8;
      border: 2px solid; border-color: #ffffff #808080 #808080 #ffffff;
      padding: 3px 10px; text-decoration: none; color: #000;
      font-size: 12px;
    }
    nav a:hover { background: #000080; color: white; }
    nav a.active { border-color: #808080 #ffffff #ffffff #808080; }

    /* ── Contenido ── */
    .container {
      margin: 10px;
      background: #d4d0c8;
      border: 2px solid; border-color: #ffffff #808080 #808080 #ffffff;
      padding: 10px;
    }

    /* ── Alertas ── */
    .alert {
      padding: 5px 10px; margin-bottom: 8px;
      border: 1px solid #000; font-size: 12px;
    }
    .alert-success { background: #c8ffc8; border-color: #006400; }
    .alert-danger   { background: #ffc8c8; border-color: #8b0000; }
    .alert-warning  { background: #fff3c8; border-color: #8b6914; }

    /* ── Tablas ── */
    .panel {
      background: white;
      border: 2px inset #808080;
      padding: 0;
      overflow-x: auto;
    }
    .panel-header {
      background: #000080; color: white;
      padding: 3px 8px; font-weight: bold; font-size: 12px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th {
      background: #d4d0c8;
      border: 1px solid #808080;
      padding: 4px 8px; text-align: left;
      white-space: nowrap;
    }
    td {
      border: 1px solid #c0c0c0;
      padding: 3px 8px;
      white-space: nowrap;
    }
    tr:nth-child(even) td { background: #f0f0f0; }
    tr:hover td { background: #000080; color: white; }

    /* ── Formularios ── */
    .form-panel {
      background: white;
      border: 2px inset #808080;
      padding: 12px; max-width: 500px;
    }
    .form-row { margin-bottom: 8px; display: flex; flex-direction: column; }
    .form-row label { font-weight: bold; font-size: 12px; margin-bottom: 2px; }
    .form-row input, .form-row select {
      border: 2px inset #808080;
      padding: 3px 5px; font-size: 12px;
    }

    /* ── Botones ── */
    .btn {
      border: 2px solid; border-color: #ffffff #808080 #808080 #ffffff;
      background: #d4d0c8; padding: 3px 10px;
      font-size: 12px; cursor: pointer; text-decoration: none; color: #000;
      display: inline-block;
    }
    .btn:active { border-color: #808080 #ffffff #ffffff #808080; }
    .btn-primary  { background: #000080; color: white; border-color: #6060c0 #000040 #000040 #6060c0; }
    .btn-danger   { background: #800000; color: white; border-color: #c06060 #400000 #400000 #c06060; }
    .btn-warning  { background: #808000; color: white; border-color: #c0c040 #404000 #404000 #c0c040; }

    .status-bar {
      background: #d4d0c8;
      border-top: 2px solid #808080;
      padding: 2px 8px; font-size: 11px;
      position: fixed; bottom: 0; left: 0; right: 0;
    }
    h2 { font-size: 13px; margin-bottom: 8px; }
  </style>
</head>
<body>

<div class="titlebar">
  <span class="icon">🗃️</span>
  Sistema de Inventario Tienda — v1.0.0 (Build 1998)
</div>

<nav>
  <a href="{{ url_for('listar_productos') }}"
     class="{{ 'active' if request.endpoint and 'producto' in request.endpoint }}">
    📦 Productos
  </a>
  <a href="{{ url_for('listar_ventas') }}"
     class="{{ 'active' if request.endpoint and 'venta' in request.endpoint }}">
    🧾 Ventas
  </a>
</nav>

<div class="container">
  {% for cat, msg in get_flashed_messages(with_categories=true) %}
    <div class="alert alert-{{ cat }}">⚠ {{ msg }}</div>
  {% endfor %}

  {% block content %}{% endblock %}
</div>

<div class="status-bar">
  Sistema listo &nbsp;|&nbsp; Base de datos: inventario.db &nbsp;|&nbsp;
  Usuario: ADMIN &nbsp;|&nbsp; {{ now }}
</div>

</body>
</html>
